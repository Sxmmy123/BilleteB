<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<title>Escáner de Billetes</title>

<style>

body{
background:#f8f9fa;
}

.camara-container{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}

video{
width:100%;
border-radius:12px;
}

/* RECUADRO GUIA */

.guia{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:80px;
border:3px solid #00ff88;
border-radius:10px;
box-shadow:0 0 10px rgba(0,255,150,0.7);
}

/* ALERTA */

#alerta{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:none;
padding:20px;
color:white;
font-size:22px;
border-radius:10px;
z-index:999;
}

.azul{background:#0d6efd;}
.naranja{background:#fd7e14;}
.lila{background:#a855f7;}
.success{background:#198754;}

</style>

</head>

<body>

<div class="container text-center py-4">

<h4 class="mb-3">Escáner de Serie</h4>

<div class="camara-container">

<video id="video" autoplay playsinline></video>

<div class="guia"></div>

</div>

<p class="text-muted mt-2">Coloque la serie dentro del recuadro</p>

</div>

<div id="alerta"></div>

<script>

const video=document.getElementById("video");
const alerta=document.getElementById("alerta");


navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream;
setInterval(escanear,2000);
});


function escanear(){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

Tesseract.recognize(canvas,'eng',{
tessedit_char_whitelist:'AB0123456789'
})
.then(({data:{text}})=>{

let limpio=text.replace(/\s/g,'');

let match=limpio.match(/(\d{8,9})B/);

if(match){

let numero=match[1];

if(numero.length==8){
numero="0"+numero;
}

numero=parseInt(numero);

verificar(numero);

}

});

}


function verificar(numero){

if(enRango(numero,rangos10)){
mostrar("X Billete inválido","azul");
return;
}

if(enRango(numero,rangos20)){
mostrar("X Billete inválido","naranja");
return;
}

if(enRango(numero,rangos50)){
mostrar("X Billete inválido","lila");
return;
}

mostrar("✔ Bien","success");

}


function mostrar(texto,color){

alerta.className=color;
alerta.innerHTML=texto;
alerta.style.display="block";

setTimeout(()=>{
alerta.style.display="none";
},3000);

}


function enRango(num,rangos){

for(let r of rangos){

if(num>=r[0] && num<=r[1]){
return true;
}

}

return false;

}

</script>

</body>
</html>

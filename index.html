<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scanner Billetes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

video{
width:100%;
max-width:500px;
border-radius:10px;
}

#scannerBox{
position:relative;
display:inline-block;
}

#scanLine{
position:absolute;
top:45%;
left:10%;
width:80%;
height:60px;
border:3px solid #00ffcc;
border-radius:8px;
}

#result{
font-size:55px;
font-weight:bold;
margin-top:20px;
}

#serial{
font-size:40px;
margin-top:10px;
}

.valid{
color:#00ff88;
}

.invalid{
color:#ff4444;
}

.invalid10{
color:#0099ff;
}

.invalid20{
color:orange;
}

.invalid50{
color:#cc66ff;
}

</style>
</head>

<body class="container py-4">

<h3 class="mb-3">Escáner de Billetes</h3>

<div id="scannerBox">

<video id="video" autoplay playsinline></video>

<div id="scanLine"></div>

</div>

<div id="result"></div>
<div id="serial"></div>

<script>

const video = document.getElementById("video")

const result = document.getElementById("result")
const serial = document.getElementById("serial")

let lastScan = ""
let cooldown = false


// Rangos inválidos
const ranges10 = [
[67250001,67700000],
[69050001,69500000],
[69500001,69950000],
[69950001,70400000],
[70400001,70850000],
[70850001,71300000],
[76310012,85139995],
[86400001,86850000],
[90900001,91350000],
[91800001,92250000]
]

const ranges20 = [
[87280145,91646549],
[96650001,97100000],
[99800001,100250000],
[100250001,100700000],
[109250001,109700000],
[110600001,111050000],
[111050001,111500000],
[111950001,112400000],
[112400001,112850000],
[112850001,113300000],
[114200001,114650000],
[114650001,115100000],
[115100001,115550000],
[118700001,119150000],
[119150001,119600000],
[120500001,120950000]
]

const ranges50 = [
[77100001,77550000],
[78000001,78450000],
[78900001,96350000],
[96350001,96800000],
[96800001,97250000],
[98150001,98600000],
[104900001,105350000],
[105350001,105800000],
[106700001,107150000],
[107600001,108050000],
[108050001,108500000],
[109400001,109850000]
]


// iniciar cámara
navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
zoom:2
}
})
.then(stream=>{
video.srcObject = stream
startScanner()
})



function checkRange(num,ranges){
for(let r of ranges){
if(num>=r[0] && num<=r[1]){
return true
}
}
return false
}



function showResult(type,number){

serial.innerText = number + " B"

if(type=="valid"){
result.className="valid"
result.innerText="✔ VÁLIDO"
}

if(type=="invalid10"){
result.className="invalid10"
result.innerText="X BILLETE 10 INVÁLIDO"
}

if(type=="invalid20"){
result.className="invalid20"
result.innerText="X BILLETE 20 INVÁLIDO"
}

if(type=="invalid50"){
result.className="invalid50"
result.innerText="X BILLETE 50 INVÁLIDO"
}

}



function process(text){

text = text.replace(/\s/g,"")

// detectar patrón
let match = text.match(/(\d{9})B/)

if(!match){

// intentar al revés (OCR común)
let rev = text.match(/B(\d{9})/)
if(rev){
match=[null,rev[1]]
}else{
return
}

}

let number = match[1]

// evitar repetir
if(number===lastScan || cooldown) return

lastScan = number
cooldown=true

setTimeout(()=>{
cooldown=false
},3000)

let num = parseInt(number)

if(checkRange(num,ranges10)){
showResult("invalid10",number)
return
}

if(checkRange(num,ranges20)){
showResult("invalid20",number)
return
}

if(checkRange(num,ranges50)){
showResult("invalid50",number)
return
}

showResult("valid",number)

}




function startScanner(){

setInterval(async()=>{

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const data=canvas.toDataURL("image/png")

const {data:{text}}=await Tesseract.recognize(data,"eng",{
tessedit_char_whitelist:"0123456789B"
})

process(text)

},1200)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<title>Escáner de Billetes</title>

<style>

body{
background:#111;
color:white;
text-align:center;
}

.camara{
position:relative;
max-width:500px;
margin:auto;
}

video{
width:100%;
border-radius:10px;
}

.guia{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:90px;
border:4px solid #00ff88;
border-radius:10px;
}

#alerta{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
z-index:999;
text-align:center;
}

.azul{background:#0d6efd;}
.naranja{background:#ff7b00;}
.lila{background:#a855f7;}
.success{background:#16a34a;}

</style>

</head>

<body>

<h3 class="mt-3">Escáner de Billetes</h3>

<div class="camara mt-3">

<video id="video" autoplay playsinline></video>
<div class="guia"></div>

</div>

<p class="mt-3">Coloque la serie dentro del recuadro</p>

<div id="alerta"></div>

<script>

const video=document.getElementById("video");
const alerta=document.getElementById("alerta");

let escaneoActivo=true;
let ultimaSerie="";

/* RANGOS */

const rangos10=[[67250001,67700000],[69050001,69500000],[69500001,69950000],[69950001,70400000],[70400001,70850000],[70850001,71300000],[76310012,85139995],[86400001,86850000],[90900001,91350000],[91800001,92250000]];

const rangos20=[[87280145,91646549],[96650001,97100000],[99800001,100250000],[100250001,100700000],[109250001,109700000],[110600001,111050000],[111050001,111500000],[111950001,112400000],[112400001,112850000],[112850001,113300000],[114200001,114650000],[114650001,115100000],[115100001,115550000],[118700001,119150000],[119150001,119600000],[120500001,120950000]];

const rangos50=[[77100001,77550000],[78000001,78450000],[78900001,96350000],[96350001,96800000],[96800001,97250000],[98150001,98600000],[104900001,105350000],[105350001,105800000],[106700001,107150000],[107600001,108050000],[108050001,108500000],[109400001,109850000]];


/* CAMARA */

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream;
setInterval(escanear,1200);
});


/* ESCANEO */

function escanear(){

if(!escaneoActivo) return;

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

let w=video.videoWidth;
let h=video.videoHeight;

/* ZOOM DIGITAL */

let cropWidth=w*0.6;
let cropHeight=h*0.18;

let x=(w-cropWidth)/2;
let y=(h-cropHeight)/2;

canvas.width=cropWidth;
canvas.height=cropHeight;

ctx.drawImage(video,x,y,cropWidth,cropHeight,0,0,cropWidth,cropHeight);

Tesseract.recognize(canvas,'eng',{
tessedit_char_whitelist:'B0123456789'
})
.then(({data:{text}})=>{

procesar(text);

});

}


/* PROCESAR TEXTO */

function procesar(text){

let limpio=text
.toUpperCase()
.replace(/[^0-9B]/g,'');

/* SOLO 9 DIGITOS + B */

let match=limpio.match(/\d{9}B/);

if(!match) return;

let serie=match[0];

/* evitar repetidos */

if(serie===ultimaSerie) return;

ultimaSerie=serie;

let numero=parseInt(serie.substring(0,9));

verificar(numero);

}


/* VERIFICAR */

function verificar(numero){

if(enRango(numero,rangos10)){
mostrar("X BILLETE INVÁLIDO","azul");
return;
}

if(enRango(numero,rangos20)){
mostrar("X BILLETE INVÁLIDO","naranja");
return;
}

if(enRango(numero,rangos50)){
mostrar("X BILLETE INVÁLIDO","lila");
return;
}

mostrar("✔ BILLETE VÁLIDO","success");

}


/* RANGO */

function enRango(num,rangos){

for(let r of rangos){

if(num>=r[0] && num<=r[1]){
return true;
}

}

return false;

}


/* ALERTA */

function mostrar(texto,color){

escaneoActivo=false;

alerta.className=color;
alerta.innerHTML=texto;
alerta.style.display="flex";

setTimeout(()=>{

alerta.style.display="none";
escaneoActivo=true;

},3000);

}

</script>

</body>
</html>
